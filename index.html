<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="img/flowers.png" type="image/x-icon">
  <title>Valentine untuk Kamu 💘</title>

  <style>
    :root{
      --bg:#0b1020;
      --card: rgba(255,255,255,.08);
      --stroke: rgba(255,255,255,.14);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.72);

      /* soft valentine palette */
      --me1:#a78bfa;   /* lavender */
      --me2:#fb7185;   /* rose */
      --shadow: 0 22px 70px rgba(0,0,0,.55);
      --r: 26px;
    }

    *{ box-sizing:border-box }
    html,body{ height:100% }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background:
        radial-gradient(1100px 700px at 18% 12%, rgba(251,113,133,.18), transparent 58%),
        radial-gradient(900px 650px at 82% 18%, rgba(167,139,250,.18), transparent 58%),
        radial-gradient(800px 500px at 50% 88%, rgba(255,255,255,.06), transparent 60%),
        linear-gradient(180deg, #070a14, var(--bg));
      overflow:hidden;
    }

    /* soft glow overlay */
    .glow{
      position:fixed;
      inset:-140px;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.08), transparent 55%),
        radial-gradient(circle at 75% 40%, rgba(255,255,255,.06), transparent 60%);
      pointer-events:none;
      filter: blur(1px);
      opacity:.8;
      animation: glowDrift 14s ease-in-out infinite alternate;
    }
    @keyframes glowDrift{
      from{ transform: translateY(0) }
      to{ transform: translateY(70px) }
    }

    /* floating hearts */
    .hearts{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.9;
      filter: drop-shadow(0 18px 26px rgba(0,0,0,.35));
    }
    .heart{
      position:absolute;
      width:14px;height:14px;
      transform: rotate(45deg);
      background: linear-gradient(135deg, rgba(251,113,133,.85), rgba(167,139,250,.85));
      border-radius: 3px;
      animation: floatUp 9.2s linear infinite;
    }
    .heart:before,.heart:after{
      content:"";
      position:absolute;
      width:14px;height:14px;
      background: inherit;
      border-radius: 50%;
    }
    .heart:before{ left:-7px; top:0 }
    .heart:after{ left:0; top:-7px }
    @keyframes floatUp{
      0%{ transform: translateY(120vh) rotate(45deg) scale(.92); opacity:0 }
      10%{ opacity:.9 }
      100%{ transform: translateY(-20vh) rotate(45deg) scale(1.12); opacity:0 }
    }

    /* center */
    .wrap{
      height:100%;
      display:grid;
      place-items:center;
      padding:18px;
      position:relative;
      z-index:2;
    }

    .card{
      width:min(560px, 100%);
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
      position:relative;
      transform: translateY(10px);
      opacity:0;
      animation: popIn .7s ease forwards;
    }
    @keyframes popIn{
      to{ transform: translateY(0); opacity:1; }
    }

    .top{
      padding:20px 18px 14px;
      background: rgba(0,0,0,.12);
      border-bottom:1px solid rgba(255,255,255,.10);
      text-align:center;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.88);
      font-weight:850;
      font-size:12.5px;
      letter-spacing:.2px;
    }

    .title{
      margin:12px 0 6px;
      font-size: clamp(30px, 6vw, 46px);
      font-weight:950;
      line-height:1.06;
      background: linear-gradient(135deg, #fff, rgba(255,255,255,.72));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      position:relative;
    }

    /* tiny animated underline */
    .title:after{
      content:"";
      display:block;
      width:86px;
      height:3px;
      margin:10px auto 0;
      border-radius:99px;
      background: linear-gradient(135deg, var(--me1), var(--me2));
      opacity:.85;
      transform: scaleX(.4);
      animation: lineGrow 1.2s ease-in-out .2s infinite alternate;
    }
    @keyframes lineGrow{
      to{ transform: scaleX(1) }
    }

    .sub{
      margin:0;
      color: var(--muted);
      line-height:1.55;
      font-size: 14.5px;
    }

    .mini{
      margin-top:10px;
      color: rgba(255,255,255,.65);
      font-size:12.5px;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .content{
      padding:16px 18px 18px;
      text-align:center;
    }

    .note{
      margin:0;
      padding:14px 14px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      line-height:1.7;
      font-size: 14.5px;
      color: rgba(255,255,255,.88);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:16px;
    }

    a.btn{
      padding:12px 14px;
      border-radius:999px;
      font-weight:900;
      cursor:pointer;
      transition: transform .12s ease, filter .12s ease, opacity .12s ease;
      user-select:none;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-width: 160px;
      justify-content:center;
    }
    a.btn:active{ transform:translateY(1px) scale(.99) }

    a.primary{
      background: linear-gradient(135deg, var(--me1), var(--me2));
      color:white;
      box-shadow: 0 16px 44px rgba(167,139,250,.16);
    }
    a.ghost{
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.9);
    }

    .foot{
      margin-top:14px;
      text-align:center;
      font-size:12.5px;
      color: rgba(255,255,255,.70);
    }

    /* small pulse on primary button */
    a.primary{
      position:relative;
      overflow:hidden;
    }
    a.primary:before{
      content:"";
      position:absolute;
      inset:-40px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.22), transparent 55%);
      transform: translateX(-40%);
      opacity:.0;
      animation: shine 2.6s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes shine{
      0%{ transform: translateX(-55%); opacity:0; }
      35%{ opacity:.6; }
      70%{ opacity:0; transform: translateX(55%); }
      100%{ opacity:0; }
    }

    @media (max-width:420px){
      a.btn{ min-width: 140px; }
    }
  </style>
</head>

<body>
  <div class="glow" aria-hidden="true"></div>

  <div class="hearts" aria-hidden="true">
    <span class="heart" style="left:10%; animation-delay:0s; animation-duration:9.2s"></span>
    <span class="heart" style="left:24%; animation-delay:1.2s; animation-duration:10.1s"></span>
    <span class="heart" style="left:38%; animation-delay:2.4s; animation-duration:9.6s"></span>
    <span class="heart" style="left:52%; animation-delay:.6s; animation-duration:11s"></span>
    <span class="heart" style="left:66%; animation-delay:1.8s; animation-duration:10.5s"></span>
    <span class="heart" style="left:80%; animation-delay:3s; animation-duration:9.8s"></span>
    <span class="heart" style="left:92%; animation-delay:2.1s; animation-duration:11.4s"></span>
  </div>

  <div class="wrap">
    <main class="card">
      <div class="top">
        <div class="badge">Valentine Day</div>
        <h1 class="title">Untuk Aghisna 🤍</h1>
        <p class="sub">Sedikit Hal Aneh Heheee...</p>
        <div class="mini">
          <span>📅 14 Februari</span>
          <span>— Reyzal</span>
        </div>
      </div>

      <div class="content">
        <div class="note">
          Click yg mana aja sayang wkwkw
        </div>

        <div class="actions">
          <a class="btn primary" href="FLORES.html">Lihat Bunga</a>
          <a class="btn ghost" href="letter.html">Buka Surat</a>
        </div>

        <div class="foot">Maap cuman ngasih ginian wkkw. 🤍</div>
      </div>
    </main>
  </div>
</body>
</html>
