  <style>
    .val-controls{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 9999;
      flex-wrap: wrap;
      justify-content: center;
    }
    .val-btn{
      border:0;
      padding:12px 14px;
      border-radius:999px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      background: linear-gradient(135deg, #7c5cff, #ff4d8d);
      color:white;
      box-shadow: 0 16px 44px rgba(0,0,0,.35);
    }
    .val-btn.ghost{
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.9);
    }

    /* kecil aja biar ga ganggu: indikator musik */
    .music-pill{
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.9);
      font-weight: 800;
      font-size: 12.5px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 16px 44px rgba(0,0,0,.35);
      user-select: none;
      opacity: .9;
    }
    .music-pill button{
      all: unset;
      cursor: pointer;
      margin-left: 10px;
      font-weight: 900;
      opacity: .95;
    }
  </style>
</head>

  <script>
    // ✅ tetap jalanin behavior awal kamu
    onload = () => {
      document.body.classList.remove("container");
    };

    // ✅ AUTOPLAY: start muted dulu (biar ga diblok)
    // lalu begitu user pertama kali tap/click, langsung unmute & play
    const bgm = document.getElementById("bgm");
    const musicState = document.getElementById("musicState");
    const toggleMusic = document.getElementById("toggleMusic");

    bgm.volume = 0.7;

    async function tryStartMuted(){
      try { await bgm.play(); } catch(e) {}
    }

    async function enableSound(){
      try{
        bgm.muted = false;
        await bgm.play();
        musicState.textContent = "ON";
        toggleMusic.textContent = "Pause";
      }catch(e){
        // kalau masih keblok, user tinggal klik tombol pause/play (yang jadi Play)
        musicState.textContent = "TAP";
        toggleMusic.textContent = "Play";
      }
    }

    // mulai muted auto
    tryStartMuted();

    // unmute di interaksi pertama user (pasti ke-allow)
    window.addEventListener("pointerdown", enableSound, { once:true });

    // tombol pause/play manual
    toggleMusic.addEventListener("click", async () => {
      if (bgm.paused) {
        bgm.muted = false;
        await bgm.play();
        musicState.textContent = "ON";
        toggleMusic.textContent = "Pause";
      } else {
        bgm.pause();
        musicState.textContent = "OFF";
        toggleMusic.textContent = "Play";
      }
    });
  </script>
